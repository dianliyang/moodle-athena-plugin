name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP archive
        run: |
          # Athena imports GitHub plugin releases by extracting one top-level
          # plugin root folder, then reading manifest.json and index.mjs from it.
          mkdir -p moodle-sync
          cp manifest.json index.mjs moodle-sync/
          zip -r moodle-sync.zip moodle-sync

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: moodle-sync.zip
          generate_release_notes: true
