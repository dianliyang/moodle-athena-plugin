name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP archive
        run: |
          # Package manifest and implementation
          zip -r moodle-sync.zip manifest.json index.mjs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: moodle-sync.zip
          generate_release_notes: true
